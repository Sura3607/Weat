services:
  mysql:
    image: mysql:8.0
    container_name: weat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-weat}
      MYSQL_USER: ${MYSQL_USER:-weat}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-weatpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weat-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER:-weat}:${MYSQL_PASSWORD:-weatpassword}@mysql:3306/${MYSQL_DATABASE:-weat}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - APP_URL=${APP_URL:-http://localhost:3000}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
