# ── Weat Docker Compose (Development) ────────────────────
# Usage:
#   docker compose up -d --build     # Build and start all
#   docker compose exec backend npx tsx src/db/migrate.ts  # Run migration
#   docker compose exec backend npx tsx src/db/seed.ts     # Seed data
#   docker compose logs -f           # View logs
#   docker compose down -v           # Stop and remove volumes

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: weat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weat"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: weat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: dev
    container_name: weat-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/weat
      REDIS_URL: redis://redis:6379
      JWT_SECRET: docker-dev-secret-weat-2024
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
      CORS_ORIGIN: "*"
      MAX_FILE_SIZE_MB: 8
      UPLOAD_DIR: ./uploads
    volumes:
      - ./backend/src:/app/src
      - ./backend/db:/app/db
      - ./backend/tests:/app/tests
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Database Migration ──────────────────────────────────
  migrate:
    build:
      context: ./backend
      target: dev
    container_name: weat-migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/weat
    command: ["npx", "tsx", "src/db/migrate.ts"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - setup

  # ── Database Seed ───────────────────────────────────────
  seed:
    build:
      context: ./backend
      target: dev
    container_name: weat-seed
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/weat
    command: ["npx", "tsx", "src/db/seed.ts"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - setup

  # ── Frontend (Next.js) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: weat-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:4000
      NEXT_PUBLIC_APP_NAME: Weat
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
