services:
  # ─── Weat App ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_ID: ${VITE_APP_ID:-weat}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Weat}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BASE_URL: ${BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      VITE_APP_ID: ${VITE_APP_ID:-weat}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - weat-net

  # ─── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Tạm thời tắt mount chứng chỉ SSL vì bạn chưa setup Certbot trên EC2 mới
      # Nếu để nguyên Nginx sẽ báo lỗi không tìm thấy thư mục Let's Encrypt
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - /var/www/certbot:/var/www/certbot:ro
    networks:
      - weat-net

networks:
  weat-net:
    driver: bridge